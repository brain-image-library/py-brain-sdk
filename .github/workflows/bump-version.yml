name: Bump Version!

on:
  push:
    branches:
      - main  # Adjust to your default branch

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run version bump script
        run: |
          python - <<'EOF'
          import re
          from pathlib import Path

          content = Path("setup.py").read_text()
          match = re.search(r'version="(\d+)\.(\d+)\.(\d+)"', content)
          if not match:
              raise SystemExit("Could not find version in setup.py")
          major, minor, patch = int(match.group(1)), int(match.group(2)), int(match.group(3))
          new_version = f"{major}.{minor}.{patch + 1}"
          updated = re.sub(r'version="\d+\.\d+\.\d+"', f'version="{new_version}"', content)
          Path("setup.py").write_text(updated)
          print(f"Bumped version to {new_version}")
          EOF

      - name: Commit updated version
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add setup.py
          git commit -m "Bump version in setup.py [skip ci]" || echo "No changes to commit"
          git push
