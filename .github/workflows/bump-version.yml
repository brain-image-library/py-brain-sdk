name: Bump Version!

on:
  push:
    branches:
      - main  # Adjust to your default branch

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run version bump script
        id: bump
        run: |
          NEW_VERSION=$(python - <<'EOF'
          import re
          from pathlib import Path

          content = Path("setup.py").read_text()
          match = re.search(r'version="(\d+)\.(\d+)\.(\d+)"', content)
          if not match:
              raise SystemExit("Could not find version in setup.py")
          major, minor, patch = int(match.group(1)), int(match.group(2)), int(match.group(3))
          new_version = f"{major}.{minor}.{patch + 1}"
          updated = re.sub(r'version="\d+\.\d+\.\d+"', f'version="{new_version}"', content)
          Path("setup.py").write_text(updated)

          init_content = Path("brainimagelibrary/__init__.py").read_text()
          init_updated = re.sub(r'__version__ = "[^"]+"', f'__version__ = "{new_version}"', init_content)
          Path("brainimagelibrary/__init__.py").write_text(init_updated)

          conf_content = Path("docs/conf.py").read_text()
          conf_updated = re.sub(r'release = "\d+\.\d+\.\d+"', f'release = "{new_version}"', conf_content)
          Path("docs/conf.py").write_text(conf_updated)

          print(new_version)
          EOF
          )
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit updated version
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add setup.py brainimagelibrary/__init__.py docs/conf.py
          git commit -m "Bump version in setup.py, __init__.py, and docs/conf.py [skip ci]" || echo "No changes to commit"
          git push

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.new_version }}" \
            --title "v${{ steps.bump.outputs.new_version }}" \
            --generate-notes
